<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>座標獵人 Coordinate Hunter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .container {
    max-width: 640px;
    width: 100%;
    background: #16213e;
    border-radius: 24px;
    padding: 32px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    border: 1px solid #0f3460;
  }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    color: #e94560;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .subtitle { text-align: center; color: #666; font-size: .8rem; margin-bottom: 20px; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .score-display { font-size: 1.8rem; font-weight: 700; color: #4ecca3; }
  .score-display span { font-size: 1rem; color: #888; }
  .timer-display { font-size: 1.8rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .timer-display.warning { color: #ffc107; }
  .timer-display.over { color: #e94560; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  .grid-container {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
  }
  .grid {
    display: grid;
    grid-template-columns: 32px repeat(11, 44px);
    gap: 2px;
    user-select: none;
  }
  .grid .label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .7rem;
    color: #666;
    height: 44px;
  }
  .grid .label.y-label { width: 32px; }
  .grid .cell {
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: .75rem;
    font-weight: 600;
    background: #0f3460;
    border: 1px solid #1a4a8a;
    transition: all .2s;
  }
  .grid .cell.target {
    background: #e94560;
    border-color: #e94560;
    color: #fff;
    box-shadow: 0 0 12px rgba(233,69,96,.5);
  }
  .grid .cell.miss {
    background: #1a1a2e;
    border-color: #333;
    color: #555;
  }
  .grid .cell:hover { border-color: #4ecca3; cursor: crosshair; }

  .input-area {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .input-area input {
    background: #1a1a2e;
    border: 2px solid #0f3460;
    color: #eee;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 1.1rem;
    width: 160px;
    text-align: center;
    outline: none;
  }
  .input-area input:focus { border-color: #e94560; }
  .input-area input::placeholder { color: #555; }
  .input-area button {
    background: #e94560;
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
    transition: all .2s;
  }
  .input-area button:hover { filter: brightness(1.15); }
  .input-area button:disabled { opacity: .4; cursor: not-allowed; }

  .message {
    text-align: center;
    min-height: 28px;
    font-size: .9rem;
    margin-bottom: 12px;
    color: #ffc107;
  }
  .message.hit { color: #4ecca3; }
  .message.miss { color: #e94560; }

  .restart-area { text-align: center; }
  .restart-area button {
    background: #0f3460;
    color: #eee;
    border: 1px solid #1a4a8a;
    padding: 10px 32px;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    transition: all .2s;
  }
  .restart-area button:hover { background: #1a4a8a; }

  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.8);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .result-overlay.show { display: flex; }
  .result-box {
    background: #16213e;
    border: 2px solid #e94560;
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  .result-box h2 { font-size: 2rem; color: #e94560; margin-bottom: 8px; }
  .result-box .final-score { font-size: 5rem; font-weight: 800; color: #4ecca3; margin: 16px 0; }
  .result-box .final-score span { font-size: 1.5rem; color: #888; }
  .result-box p { color: #888; margin-bottom: 20px; }
  .result-box button {
    background: #4ecca3;
    color: #1a1a2e;
    border: none;
    padding: 12px 40px;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }
  .result-box button:hover { filter: brightness(1.15); }
</style>
</head>
<body>

<div class="container">
  <h1>🎯 座標獵人</h1>
  <p class="subtitle">找出隱藏的座標點！輸入格式：<code>x,y</code>（例：2,-3）</p>

  <div class="top-bar">
    <div class="score-display"><span>🎯</span> <span id="score">0</span><span>/10</span></div>
    <div class="timer-display" id="timerDisplay">60</div>
  </div>

  <div class="grid-container">
    <div class="grid" id="grid"></div>
  </div>

  <div class="message" id="message">&nbsp;</div>

  <div class="input-area">
    <input type="text" id="guessInput" placeholder="x,y 輸入座標" maxlength="8" autocomplete="off">
    <button id="shootBtn">🎯 射擊</button>
  </div>

  <div class="restart-area">
    <button id="restartBtn">↺ 重新開始</button>
  </div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <h2>⏰ 時間到！</h2>
    <div class="final-score"><span id="finalScore">0</span><span>/10</span></div>
    <p>你找到了隱藏座標</p>
    <button id="playAgainBtn">🔄 再玩一次</button>
  </div>
</div>

<script>
  const SIZE = 11;
  const TOTAL_TARGETS = 10;
  const TIME_LIMIT = 60;

  let targets = [];
  let hits = new Set();
  let misses = new Set();
  let score = 0;
  let timeLeft = TIME_LIMIT;
  let timerInterval = null;
  let isActive = false;

  const gridEl = document.getElementById('grid');
  const scoreEl = document.getElementById('score');
  const timerEl = document.getElementById('timerDisplay');
  const messageEl = document.getElementById('message');
  const guessInput = document.getElementById('guessInput');
  const shootBtn = document.getElementById('shootBtn');
  const restartBtn = document.getElementById('restartBtn');
  const resultOverlay = document.getElementById('resultOverlay');
  const finalScoreEl = document.getElementById('finalScore');
  const playAgainBtn = document.getElementById('playAgainBtn');

  function generateTargets() {
    const set = new Set();
    while (set.size < TOTAL_TARGETS) {
      const x = Math.floor(Math.random() * SIZE) - 5;
      const y = Math.floor(Math.random() * SIZE) - 5;
      set.add(`${x},${y}`);
    }
    return [...set].map(s => s.split(',').map(Number));
  }

  function buildGrid() {
    gridEl.innerHTML = '';
    // Corner
    gridEl.innerHTML += '<div class="label"></div>';
    // X labels
    for (let x = -5; x <= 5; x++) {
      gridEl.innerHTML += `<div class="label">${x}</div>`;
    }
    // Y labels + cells
    for (let y = 5; y >= -5; y--) {
      gridEl.innerHTML += `<div class="label y-label">${y}</div>`;
      for (let x = -5; x <= 5; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.x = x;
        cell.dataset.y = y;
        cell.textContent = '';
        gridEl.appendChild(cell);
      }
    }
  }

  function updateGrid() {
    const cells = gridEl.querySelectorAll('.cell');
    cells.forEach(cell => {
      const x = parseInt(cell.dataset.x);
      const y = parseInt(cell.dataset.y);
      const key = `${x},${y}`;
      cell.className = 'cell';
      if (hits.has(key)) {
        cell.classList.add('target');
        cell.textContent = '●';
      } else if (misses.has(key)) {
        cell.classList.add('miss');
        cell.textContent = '×';
      }
    });
  }

  function startTimer() {
    timeLeft = TIME_LIMIT;
    timerEl.textContent = timeLeft;
    timerEl.className = 'timer-display';
    isActive = true;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft;
      timerEl.className = 'timer-display';
      if (timeLeft <= 10) timerEl.classList.add('warning');
      if (timeLeft <= 0) {
        timerEl.classList.add('over');
        endGame();
      }
    }, 1000);
  }

  function endGame() {
    isActive = false;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    shootBtn.disabled = true;
    guessInput.disabled = true;
    finalScoreEl.textContent = score;
    resultOverlay.classList.add('show');
  }

  function initGame() {
    targets = generateTargets();
    hits = new Set();
    misses = new Set();
    score = 0;
    scoreEl.textContent = '0';
    messageEl.textContent = '🎯 開始狩獵！';
    messageEl.className = 'message';
    resultOverlay.classList.remove('show');
    shootBtn.disabled = false;
    guessInput.disabled = false;
    guessInput.value = '';
    guessInput.focus();
    updateGrid();
    startTimer();
  }

  function handleGuess() {
    if (!isActive) return;
    const raw = guessInput.value.trim();
    const match = raw.match(/^(-?\d+)\s*[,，]\s*(-?\d+)$/);
    if (!match) {
      messageEl.textContent = '⚠️ 格式錯誤！請輸入 x,y（例：2,-3）';
      messageEl.className = 'message miss';
      guessInput.value = '';
      guessInput.focus();
      return;
    }
    const x = parseInt(match[1]);
    const y = parseInt(match[2]);
    if (x < -5 || x > 5 || y < -5 || y > 5) {
      messageEl.textContent = '⚠️ 座標範圍：-5 到 5';
      messageEl.className = 'message miss';
      guessInput.value = '';
      guessInput.focus();
      return;
    }

    const key = `${x},${y}`;
    if (hits.has(key) || misses.has(key)) {
      messageEl.textContent = '⚠️ 這個座標已經猜過了';
      messageEl.className = 'message miss';
      guessInput.value = '';
      guessInput.focus();
      return;
    }

    const isHit = targets.some(t => t[0] === x && t[1] === y);
    if (isHit) {
      hits.add(key);
      score++;
      scoreEl.textContent = score;
      messageEl.textContent = `🎯 命中！(${x},${y}) 還有 ${TOTAL_TARGETS - score} 個目標`;
      messageEl.className = 'message hit';
      if (score >= TOTAL_TARGETS) {
        isActive = false;
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        finalScoreEl.textContent = score;
        resultOverlay.querySelector('h2').textContent = '🏆 全數命中！';
        resultOverlay.classList.add('show');
      }
    } else {
      misses.add(key);
      messageEl.textContent = `❌ 沒中 (${x},${y})，再試一次`;
      messageEl.className = 'message miss';
    }
    updateGrid();
    guessInput.value = '';
    guessInput.focus();
  }

  shootBtn.addEventListener('click', handleGuess);
  guessInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleGuess();
  });

  restartBtn.addEventListener('click', () => {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    resultOverlay.classList.remove('show');
    initGame();
  });

  playAgainBtn.addEventListener('click', () => {
    resultOverlay.classList.remove('show');
    initGame();
  });

  buildGrid();
  initGame();
</script>
</body>
</html>
